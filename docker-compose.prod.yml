x-django: &django
  build:
    context: .
    dockerfile: Dockerfile
    args:
      REQUIREMENTS_FILE: requirements/prod.txt
  env_file:
    - .env
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  backend:
    <<: *django
    command: prod-webserver
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  celeryworker:
    <<: *django
    command: celery-worker
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  celerybeat:
    <<: *django
    command: celery-beat
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  postgres:
    image: postgres:17-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

volumes:
  postgres_data:
